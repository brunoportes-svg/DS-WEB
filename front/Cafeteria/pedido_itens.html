<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Pedido - Cafeteria</title>
    <link rel="stylesheet" href="assets/css/style.css"> </head>
<body>

    <ul>
        <li><a href="pedidos.html">Voltar para Pedidos</a></li>
    </ul>

    <h1>Detalhes do Pedido</h1>

    <div class="formulario">
        <h3>Adicionar Produto ao Pedido</h3>
        
        <label for="selectProduto">Selecione o Produto:</label>
        <select id="selectProduto" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 2px solid;">
            </select>

        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" value="1" min="1" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 2px solid;">

        <button onclick="adicionarItem()" class="button button-enviar">Adicionar Produto</button>
    </div>

    <div class="tabela">
        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Valor Unit.</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="corpoTabelaItens">
                </tbody>
            <tfoot>
                <tr>
                    <td colspan="3" style="text-align: right; font-weight: bold; padding: 10px;">Total do Pedido:</td>
                    <td id="totalGeral" style="font-weight: bold; background-color: #f2f2f2;">R$ 0.00</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script src="assets/js/pedido_itens.js"></script>
</body>
</html>
