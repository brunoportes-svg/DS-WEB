<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initia
l-scale=1.0">
    <title>Formulário - Prática de Validação JS</title>
</head>
<style>
    span {
        color: red;
    }
</style>

<body>
    <h1>Formulário de Cadastro</h1>
 
    <form id="formulario">

         <br>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: Maria Silva" class="inputs required" oninput="nameValite()">
        <span id="erro-nome" class="span required"></span>

        <br>
        <br>
        
        <label for="email">E-mail:</label>
        <input type="text" id="email" name="email" placeholde r="Ex: maria@email.com" class="inputs required" oninput="emailValite()">
        <span id="erro-email" class="span required"></span>

        <br>
        <br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeh older="Mínimo 8 caracteres"class="inputs required" oninput="senhaValite()">
        <span id="erro-senha" class="span required"></span>
        <br>

        <label for="confirma-senha">Confirmar senha:</label>
        <input type="password" id="confirma-senha" name="confirma-senha" placeholder="Repita a senha" class="inputs required" oninput="confirmaSenhaValite()">
        <span id="erro-senha" class="span required"></span>

        <br>
        <br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Ex: 000.000.000-00" maxlength="14" class="inputs required" oninput="cpfValite()">
        <span id="erro-cpf" class="span required"></span>

        <br>
        <br>

       
        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" name="telefone" plac eholder="Ex: (11) 99999-9999" maxlength="15" class="inputs required" oninput="telefoneValite()">
        <span id="erro-telefone" class="span required"></span>

        <br>
        <br>
        

        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" placeholder="Ex: 01310-100" maxlength="9" class="inputs required" oninput="cepValite()">
        <span id="erro-cep" class="span required"></span>

        <br>
        <br>

        <label for="data-nascimento">Data:</label>
        <input type="text" id="data-nascimento" name="data-nascimento" placeholder="Ex: 31/12/1990" maxlength="10" class="inputs required" oninput="dataNascimentoValite()">
        <span id="erro-data-nascimento" class="span required"></span>

        <br>
        <br>

        <label for="valor">Valor:</label>
        <input type="text" id="valor" name="valor" placeholde r="Ex: 1.299,90" class="inputs required" oninput="valorValite()">
        <span id="erro-valor" class="span required"></span>

        <br>
        <br>

        <label for="url">URL:</label>
        <input type="text" id="url" name="url" placeholder="Ex: https://meusite.com.br" class="inputs required" oninput="urlValite()">
        <span id="erro-url" class="span required"></span>

        <br>
        <br>
        <label for="cartao">Número do cartão:</label>

        <input type="text" id="cartao" name="cartao" placehol der="Ex: 4111 1111 1111 1111" maxlength="19" class="inputs required" oninput="cartaoValite()">
        <span id="erro-cartao" class="span required"></span>

        <br>
        <br>

        <button type="submit">Enviar</button>

        <button type="reset">Limpar</button>

    </form>
    <hr>
    <div id="resultado"></div>
</body>
<script>
    const formulario = document.getElementById('formulario');
    const campos = formulario.querySelectorAll('.inputs.required');
    const spans = formulario.querySelectorAll('span.required');
    const emailregex = /^[^\s@]+@[^\s@]+\.com$/;
    const cpfregex = /^\d{3}\.\d{3}\.\d{3}-\d{2}$/;
    const telefoneregex = /^\(\d{2}\) \d{4,5}-\d{4}$/;
    const cepregex = /^\d{5}-\d{3}$/;

function Seterror (index) {
    campos[index].style.border = '4px solid red';
    spans[index].style.display = 'block';
    }

    function removeError (index) {
        campos[index].style.border = '';
        spans[index].style.display = 'none';
    }

  function nameValite () {
    if (campos[0].value.length < 3) 
    {
        Seterror(0)
        spans[0].innerText = 'o nome deve ter 3 caracteres'
    }
    else    
    {
        removeError(0)
    }                   
}

    function emailValite () {
        if (!emailregex.test(campos[1].value)) {
            Seterror(1)
            spans[1].innerText = 'o e-mail deve ter @ e .com'
            
        }
        else {
            removeError(1)
           
        }
    }      
       

    function senhaValite () {
        if (campos[2].value.length < 8) {
            Seterror(2)
            spans[2].innerText = 'a senha deve conter no mínimo 8 caracteres'
        }
        else {
            removeError(2)
        }
    }
 
    function confirmaSenhaValite () {
        if (campos[2].value !== campos[3].value || campos[3].value === '') {
            Seterror(3)
            spans[3].innerText = 'as senhas devem ser iguais'
        }
        else {
            removeError(3)
        }
    }

    function cpfValite () {
        if (!cpfregex.test(campos[4].value)) {
            Seterror(4)
            spans[4].innerText = 'o CPF deve estar no formato 000.000.000-00'
        }
        else {
            removeError(4)
        }
    }

    function telefoneValite () {
        if (!telefoneregex.test(campos[5].value)) {
            Seterror(5)
            spans[5].innerText = 'o telefone deve estar no formato (11) 99999-9999'
        }
        else {
            removeError(5)
        }
    }

    function cepValite () {
        if (!cepregex.test(campos[6].value)) {
            Seterror(6)
            spans[6].innerText = 'o CEP deve estar no formato 00000-000'
        }
        else {
            removeError(6)
        }
    }

    function dataNascimentoValite () {
        const dataRegex = /^\d{2}\/\d{2}\/\d{4}$/;
        if (!dataRegex.test(campos[7].value)) {
            Seterror(7)
            spans[7].innerText = 'a data deve estar no formato DD/MM/AAAA'
        }
        else {
            removeError(7)
        }
    }


   function valorValite() {
    const valorStr = campos[8].value; // Ex: "1.299,90"
    const valorNum = parseFloat(valorStr.replace(/\./g, '').replace(',', '.'));

    if (isNaN(valorNum) || valorNum < 10 || valorNum > 1000000) {
        Seterror(8);
        spans[8].innerText = 'O valor deve estar entre 10 e 1.000.000, ex: 1.299,90';
    } else {
        removeError(8);
    }
}

    function urlValite () {
        try {
            new URL(campos[9].value);
            removeError(9)
        } catch (_) {
            Seterror(9)
            spans[9].innerText = 'a URL deve estar no formato https://meusite.com.br'
        }
    }

    function cartaoValite () {
        const cartaoRegex = /^\d{4} \d{4} \d{4} \d{4}$/;
        if (!cartaoRegex.test(campos[10].value)) {
            Seterror(10)
            spans[10].innerText = 'o número do cartão deve estar no formato 4111 1111 1111 1111'
        }
        else {
            removeError(10)
        }
    }


        const form = document.getElementById("formulario");

  form.addEventListener("submit", function(event) {
    event.preventDefault(); // impede o envio real

    const dados = new FormData(form);
    const objeto = Object.fromEntries(dados.entries());

    console.log(objeto);
  });


</script>
<link rel="stylesheet" href="style.css">
</html>
